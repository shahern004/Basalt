# Basalt Portal — nginx configuration
# Serves the portal landing page over HTTPS and proxies health checks
# to upstream services via host.docker.internal.

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# --- HTTPS server ---
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/portal.crt;
    ssl_certificate_key /etc/nginx/certs/portal.key;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static portal page ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health proxy routes ──
    # Same-origin proxying eliminates CORS issues for the JS fetch() calls.
    # Each route forwards to the respective service's health endpoint.
    # On upstream failure, @health_down returns a consistent 503 JSON body.

    location /health/onyx {
        proxy_pass http://host.docker.internal:3000/;
        proxy_connect_timeout 3s;
        proxy_read_timeout    5s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @health_down;
    }

    location /health/open-webui {
        proxy_pass http://host.docker.internal:3002/;
        proxy_connect_timeout 3s;
        proxy_read_timeout    5s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @health_down;
    }

    location /health/litellm {
        proxy_pass http://host.docker.internal:8000/health;
        proxy_connect_timeout 3s;
        proxy_read_timeout    5s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @health_down;
    }

    location /health/langfuse {
        proxy_pass http://host.docker.internal:3001/api/public/health;
        proxy_connect_timeout 3s;
        proxy_read_timeout    5s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @health_down;
    }

    location /health/vllm {
        proxy_pass http://host.docker.internal:8001/health;
        proxy_connect_timeout 3s;
        proxy_read_timeout    5s;
        proxy_intercept_errors on;
        error_page 500 502 503 504 = @health_down;
    }

    # ── Fallback for unreachable upstreams ──
    location @health_down {
        default_type application/json;
        return 503 '{"status":"down"}';
    }
}
