services:
  portal:
    image: ${PORTAL_IMAGE:-nginx:alpine}
    ports:
      - ${PORTAL_PORT_HTTP:-80}:80
      - ${PORTAL_PORT_HTTPS:-443}:443
    volumes:
      - ./nginx/portal.conf:/etc/nginx/conf.d/default.conf:ro
      - ./html/index.html:/usr/share/nginx/html/index.html:ro
      - ./certs/portal.crt:/etc/nginx/certs/portal.crt:ro
      - ./certs/portal.key:/etc/nginx/certs/portal.key:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "--no-check-certificate", "-q", "https://127.0.0.1:443/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
