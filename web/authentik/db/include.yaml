---
services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres}:${POSTGRES_TAG:-16-alpine}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - database:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${PG_PASS:?error}
      POSTGRES_USER: ${PG_USER:-authentik}
      POSTGRES_DB: ${PG_DB:-authentik}
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

  redis:
    image: ${REDIS_IMAGE:-redis}:${REDIS_TAG:-7.4-alpine}
    command: --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:?error}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?error}
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

volumes:
  database:
  redis:
