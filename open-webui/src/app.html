<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" crossorigin="use-credentials" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" crossorigin="use-credentials" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
		<meta name="robots" content="noindex,nofollow" />
		<script>
			// On page load or when changing themes, best to add inline in `head` to avoid FOUC
			(() => {
				if (
					localStorage.theme === 'light' ||
					(!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: light)').matches)
				) {
					document.documentElement.classList.add('light');
				} else if (localStorage.theme && localStorage.theme !== 'system') {
					localStorage.theme.split(' ').forEach((e) => {
						document.documentElement.classList.add(e);
					});
				} else if (localStorage.theme && localStorage.theme === 'system') {
					systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
					document.documentElement.classList.add(systemTheme ? 'dark' : 'light');
				} else {
					document.documentElement.classList.add('dark');
				}

				window.matchMedia('(prefers-color-scheme: dark)').addListener((e) => {
					if (localStorage.theme === 'system') {
						if (e.matches) {
							document.documentElement.classList.add('dark');
							document.documentElement.classList.remove('light');
						} else {
							document.documentElement.classList.add('light');
							document.documentElement.classList.remove('dark');
						}
					}
				});
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>

		<div
			id="splash-screen"
			style="
				position: fixed;
				z-index: 100;
				background: #fff;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
			"
		>
			<script id="splash-screen-timeout">
				// re-assign the page to itself to trigger a refresh after 5 seconds
				// once the page is loaded the parent element will be removed
				const splashScreenTimeout = setTimeout(() => {
					window.location.replace(window.location.href)
				}, 5000);

				const element = document.currentScript.parentElement;
				element.addEventListener('clear-splash-screen-timeout', () => {
					clearTimeout(splashScreenTimeout)
				});

			</script>
			<style type="text/css" nonce="">
				html {
					overflow-y: scroll !important;
				}
			</style>

			<img
				style="
					position: absolute;
					width: 4rem;
					height: 4rem;
					top: 46%;
					left: 50%;
					margin: -40px 0 0 -40px;
				"
				src="%sveltekit.assets%/favicon.png"
				crossorigin="use-credentials"
			/>
	</body>
</html>
